name: aspire
channels:
  - conda-forge
  - nodefaults
dependencies:
  - python=3.12
  - pip
  - setuptools=69.5.1  # 🛠️ Versión específica para compatibilidad con pkg_resources
  - numpy<2.0.0        # Evita errores de compatibilidad con ydata-profiling
  
  # --- Backend / API ---
  - fastapi>=0.115.0
  - python-multipart>=0.0.18
  - uvicorn>=0.30.6
  - starlette>=0.40.0
  - pydantic>=2.9.0
  
  # --- Procesamiento de Datos (Python) ---
  - pandas>=2.2.2
  - python-duckdb>=1.1.0
  - psutil>=6.0.0
  - chardet>=5.2.0
  - urllib3>=2.2.2
  
  # --- Ecosistema R ---
  - r-base>=4.4.0
  - r-duckdb>=1.1.0
  - r-knitr
  - r-rmarkdown
  - r-logger
  - r-kableextra
  - r-dbi
  - r-dplyr
  - r-purrr
  - r-remotes
  - r-rjson
  - r-hmisc

  # --- Dependencias exclusivas de pip ---
  - pip:
    - ydata-profiling==4.18.1