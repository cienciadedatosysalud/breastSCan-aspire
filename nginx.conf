server {
    listen 3000 default_server;
    listen [::]:3000 default_server;

    server_name _;

    # Carpeta raíz donde se encuentra el build del frontend (UI)
    root /var/www/html;
    index index.html index.htm;

    # Configuración para el Frontend (Single Page Application)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Redirección de la API hacia tu servicio en el puerto 8000
    location /api/ {
        proxy_pass http://127.0.0.1:8000; # Apunta a tu API corriendo localmente
        proxy_http_version 1.1;

        # Cabeceras estándar para mantener la información original de la petición
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Opcional: Ajustes de tiempo de espera por si tu API tarda en procesar
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }
}